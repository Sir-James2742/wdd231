<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nairobi City Traffic </title>
    <meta name="author" content="James Omondi">
    <meta name="decsription" content="This is a page to help inform people residing in Nairobi to navigate traffic">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Merriweather:ital,opsz,wght@0,18..144,300..900;1,18..144,300..900&family=Roboto&display=swap"
        rel="stylesheet">

    <script src="https://api.tomtom.com/maps-sdk-for-web/cdn/6.x/6.20.0/maps/maps-web.min.js"></script>
    <link rel="stylesheet" href="https://api.tomtom.com/maps-sdk-for-web/cdn/6.x/6.20.0/maps/maps.css">

    <link rel="icon" href="images/favicon.svg">
    <link rel="stylesheet" href="styles/base.css">
    <link rel="stylesheet" href="styles/large.css">

    <script src="scripts/dates.js" defer></script>
    <script src="scripts/navigation.js" defer></script>
    <script src="scripts/dashboard.js" defer></script>
</head>

<body>
    <header>
        <img src="images/traffic.svg" alt="icon-logo" height="22" width="22">
        <span>Nairobi City Traffic</span>
        <button id="ham" class="hamburger"></button>

        <nav id="nav-bar" class="navigation">
            <ul>
                <li  ><a href="final.html">Home</a></li>
                <li><a href="maps.html">Maps</a></li>
                <li><a href="alerts.html">Alerts</a></li>
                <li><a href="dashboard.html">Dashboard</a></li>
                <li><a href="report.html">Report incident</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <h1>🚦 Nairobi Traffic Dashboard</h1>
        
        <div class="dashboard">
        
            
            <div class="cards">
                <div class="card">🚨 Incidents: <span id="incidents-count">0</span></div>
                <div class="card">🔴 Heavy: <span id="heavy-count">0</span></div>
                <div class="card">🟡 Moderate: <span id="moderate-count">0</span></div>
                <div class="card">🟢 Clear: <span id="clear-count">0</span></div>
            </div>
        
            
            <div class="main">
        
                
                <div id="map"></div>
        
                
                <div class="side-panel">
        
                    <h2>Traffic Status</h2>
                    <p id="current-temp"></p>
                    <p id="caption-desc"></p>
        
                    <h2>Recent Incidents</h2>
                    <ul id="incident-list"></ul>
        
                </div>
        
            </div>
        
        </div>

    </main>
    <footer>
        <span>Follow us on</span>
        <div class="social">
            <a href="https://www.facebook.com/"><img src="images/facebook.svg" alt="facebook icon" height="24" width="24"></a>
            <a href="https://www.instagram.com/"><img src="images/insta.svg" alt="instagram icon" height="24" width="24"></a>
            <a href="https://www.x.com/"><img src="images/twitter.svg" alt="twitter icon" height="24" width="24"></a>
        </div>
        <p>©<span id="current-year"></span> Nairobi Chamber of Commerce</p>
        <span id="lastModified"></span>
    </footer>
</body>

</html>
