<!DOCTYPE html>
<html lang="en-US">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

        The intent of a chamber of commerce is to foster networking and to advocate on the 
        behalf of the community.">
    <link rel="icon" href="images/favicon.png">
    <meta property="og:title" content="Chamber of Commerce ">
    <meta property="og:description" content="A chamber of commerce is a local organization 
        of businesses that work together to strengthen the business interests of the group. 
        The intent of a chamber of commerce is to foster networking and to advocate on the 
        behalf of the community">
    <meta property="og:image"
        content="https://thumbs.dreamstime.com/b/chamber-commerce-text-written-torn-paper-163992289.jpg">
    <meta property="og:url" content="https://github.com/Sir-James2742/wdd231/blob/main/chamber/directrory.html">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Libre+Franklin:ital,wght@0,100..900;1,100..900&family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Roboto&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles/normalize.css">
    <link rel="stylesheet" href="styles/base.css">
    <link rel="stylesheet" href="styles/large.css">
    
    <script src="scripts/date.js" defer></script>
    <script src="scripts/navigation.js" defer></script>
    <script src="scripts/join.js" defer></script>
    

</head>
<body class="join-page">
    <div class="head">
        <header>
    
            <img src="images/building.svg" alt="icon-logo" height="24" width="24">
            <span>Nairobi Chamber of Commerce</span>
            <img src="images/brilliance.svg" alt="brilliance" id="log">
            <button id="ham" class="hamburger"></button>
        </header>
    
        <nav id="nav-bar" class="navigation">
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="directory.html">Directory</a></li>
                <li><a href="join.html">Join</a></li>
                <li><a href="#">Discover</a></li>
            </ul>
        </nav>
    </div>
    <h1>Join</h1>

    <main>
        <form method="get" action="thankyou.html" class="join-form">
            <h2>Membership form</h2>
            <label >
                First Name
                <input type="text" name="first" required autocomplete="given name" title="your first name" >
            </label>
            <label >
                Last Name
                <input type="text" name="last" required autocomplete="last name" title="your last name">
            </label>
            <label >
                Organizational title
                <input type="text" name="title" autocomplete="Organizational-title" title="your organizational title">
            </label>
            <label >
                Email Address
                <input type="email" name="email" autocomplete="email" title="your email" placeholder="example@gmail.com" required>
            </label>
            <label>
                Phone Number
                <input type="tel" name="phone" autocomplete="tel" title="phone number" placeholder="0712345678" required>
            </label>
            <label >
                Business Name
                <input type="text" name="businessname" autocomplete="business name" title="business  name" required>
            </label>
            <label >
                Membership Level
                <select name="membership" required>
                    <option value="non profit">Non Profit</option>
                    <option value="bronze">Bronze</option>
                    <option value="silver">Silver</option>
                    <option value="gold">Gold</option>
                </select>
            </label>
            <label >
                Description
                <textarea name="description" title="business description"></textarea>
            </label>
            <label>
                <input type="hidden" name="timestamp" id="timestamp">
                <input type="submit" value="submit">
            </label>
            
        </form>
        <article>
        <h2>Membership level details</h2>
        <div class="modalbtn">
            <button id="np">Non Profit</button>
            <button id="bronze">Bronze</button>
            <button id="silver">Silver</button>
            <button id="gold">Gold</button>
        </div>
        </article>


        <dialog id="myModal">
           <div></div>
            <button id="closeModal">Close</button>
        </dialog>
    </main>
    <footer>
        <p>©<span id="current-year"></span> Nairobi Chamber of Commerce</p>
        <span id="lastModified"></span>
        
    </footer>
</body>
</html>
